<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ασκήσεις Ιστορίας Τέχνης</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #f5f0e8;
    font-family: Georgia, serif;
    color: #2c1f0e;
    padding: 2rem 1rem 3rem;
  }

  .header {
    text-align: center;
    margin-bottom: 2rem;
  }
  .header .sub {
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #8b7355;
    margin-bottom: 0.5rem;
  }
  .header h1 {
    font-size: 1.3rem;
    font-weight: normal;
    line-height: 1.5;
  }
  .header .line {
    width: 50px;
    height: 2px;
    background: #8b7355;
    margin: 0.9rem auto 0;
  }

  /* Score summary */
  .summary {
    background: #ede6d6;
    border: 1px solid #c9b89a;
    border-radius: 10px;
    padding: 1rem 1.2rem;
    margin-bottom: 1.5rem;
    text-align: center;
  }
  .summary .label {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #8b7355;
    margin-bottom: 0.4rem;
  }
  .summary .total {
    font-size: 1.6rem;
    color: #2c1f0e;
  }
  .summary .total span {
    font-size: 0.9rem;
    color: #8b7355;
  }
  .progress-bar {
    height: 6px;
    background: #d6cabb;
    border-radius: 3px;
    margin-top: 0.6rem;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: #5a8a5a;
    border-radius: 3px;
    transition: width 0.4s ease;
  }

  /* Exercise cards */
  .cards {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    max-width: 500px;
    margin: 0 auto;
  }

  .card {
    background: #fff;
    border: 1px solid #d6cabb;
    border-radius: 12px;
    padding: 1rem 1.2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    text-decoration: none;
    color: inherit;
    box-shadow: 0 2px 8px rgba(44,31,14,0.05);
    transition: transform 0.15s, box-shadow 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .card:active {
    transform: scale(0.98);
    box-shadow: 0 1px 4px rgba(44,31,14,0.08);
  }

  .card-icon {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: #ede6d6;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.3rem;
    flex-shrink: 0;
  }
  .card-icon.done {
    background: #eaf4ea;
  }
  .card-icon.perfect {
    background: #eaf4ea;
  }

  .card-info {
    flex: 1;
  }
  .card-title {
    font-size: 1rem;
    margin-bottom: 0.2rem;
  }
  .card-sub {
    font-size: 0.75rem;
    color: #8b7355;
  }

  .card-score {
    text-align: right;
    flex-shrink: 0;
  }
  .score-badge {
    display: inline-block;
    padding: 0.25rem 0.6rem;
    border-radius: 12px;
    font-size: 0.8rem;
    font-weight: bold;
  }
  .score-badge.none {
    background: #ede6d6;
    color: #8b7355;
  }
  .score-badge.partial {
    background: #fdf6ee;
    color: #7a5c2e;
    border: 1px solid #c9a96e;
  }
  .score-badge.perfect {
    background: #eaf4ea;
    color: #3a6b3a;
    border: 1px solid #5a8a5a;
  }

  .reset-all {
    text-align: center;
    margin-top: 1.5rem;
  }
  .btn-reset-all {
    background: transparent;
    color: #b0a48a;
    border: 1px solid #b0a48a;
    border-radius: 6px;
    padding: 0.5rem 1.2rem;
    font-family: Georgia, serif;
    font-size: 0.8rem;
    cursor: pointer;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<div class="header">
  <div class="sub">Ιστορία Τέχνης</div>
  <h1>Ασκήσεις<br>Συμπλήρωσης Κενών</h1>
  <div class="line"></div>
</div>

<!-- Score summary -->
<div class="summary" style="max-width:500px; margin: 0 auto 1.5rem;">
  <div class="label">Συνολική Πρόοδος</div>
  <div class="total" id="totalScore">0 <span>/ 0 σωστές</span></div>
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>
</div>

<!-- Cards -->
<div class="cards" id="cards"></div>

<div class="reset-all">
  <button class="btn-reset-all" onclick="resetAll()">Διαγραφή όλων των σκορ</button>
</div>

<script>
const EXERCISES = [
  { file: "moralis.html",            title: "Γιάννης Μόραλης",    sub: "Επιτύμβια Σύνθεση",     icon: "🎨", total: 7 },
  { file: "klimt.html",              title: "Γκούσταβ Κλιμτ",     sub: "Άσκηση κατανόησης",      icon: "🖼️", total: 7 },
  { file: "peiramatikosxoleio.html", title: "Δημήτρης Πικιώνης",  sub: "Πειραματικό Σχολείο",    icon: "🏛️", total: 7 },
  { file: "potiriapsenti.html",      title: "Πάμπλο Πικάσο",      sub: "Άσκηση κατανόησης",      icon: "🎭", total: 7 },
  { file: "xoros1.html",             title: "Ανρί Ματίς",         sub: "Άσκηση κατανόησης",      icon: "💃", total: 7 },
];

function getScores() {
  try { return JSON.parse(localStorage.getItem('askiseis_scores') || '{}'); } catch { return {}; }
}

function saveScores(s) {
  localStorage.setItem('askiseis_scores', JSON.stringify(s));
}

function resetAll() {
  if (confirm('Να διαγραφούν όλα τα σκορ;')) {
    localStorage.removeItem('askiseis_scores');
    render();
  }
}

function render() {
  const scores = getScores();
  const container = document.getElementById('cards');
  container.innerHTML = '';

  let totalCorrect = 0, totalPossible = 0;

  EXERCISES.forEach(ex => {
    const s = scores[ex.file];
    const hasScore = s !== undefined;
    const isPerfect = hasScore && s === ex.total;

    totalPossible += ex.total;
    if (hasScore) totalCorrect += s;

    // Icon
    let iconClass = 'card-icon';
    let iconContent = ex.icon;
    if (isPerfect) { iconClass += ' perfect'; iconContent = '⭐'; }
    else if (hasScore) { iconClass += ' done'; }

    // Badge
    let badgeClass = 'score-badge none';
    let badgeText = 'Αδοκίμαστη';
    if (hasScore) {
      if (isPerfect) { badgeClass = 'score-badge perfect'; badgeText = `${s}/${ex.total} ✓`; }
      else { badgeClass = 'score-badge partial'; badgeText = `${s}/${ex.total}`; }
    }

    const card = document.createElement('a');
    card.href = ex.file;
    card.className = 'card';
    card.innerHTML = `
      <div class="${iconClass}">${iconContent}</div>
      <div class="card-info">
        <div class="card-title">${ex.title}</div>
        <div class="card-sub">${ex.sub}</div>
      </div>
      <div class="card-score">
        <span class="${badgeClass}">${badgeText}</span>
      </div>
    `;
    container.appendChild(card);
  });

  // Update summary
  const doneExercises = Object.keys(scores).length;
  document.getElementById('totalScore').innerHTML =
    `${totalCorrect} <span>/ ${totalPossible} σωστές</span>`;
  const pct = totalPossible > 0 ? (totalCorrect / totalPossible) * 100 : 0;
  document.getElementById('progressFill').style.width = pct + '%';
}

// Listen for score updates from exercise pages
window.addEventListener('storage', render);

render();
</script>
</body>
</html>
