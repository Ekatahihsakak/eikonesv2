<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#f5f0e8;font-family:Georgia,serif;padding:1.5rem 1rem 3rem;color:#2c1f0e}
.header{text-align:center;margin-bottom:1.75rem}.header .sub{font-size:.65rem;letter-spacing:.25em;text-transform:uppercase;color:#8b7355;margin-bottom:.4rem}.header h1{font-size:1.2rem;font-weight:normal;line-height:1.5}.header .line{width:50px;height:2px;background:#8b7355;margin:.9rem auto 0}
.bank-box{background:#ede6d6;border:1px solid #c9b89a;border-radius:10px;padding:.9rem 1rem;margin-bottom:1.5rem}.bank-label{font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:#8b7355;margin-bottom:.6rem}.bank-words{display:flex;flex-wrap:wrap;gap:.45rem}
.word-chip{padding:.35rem .8rem;border-radius:20px;background:#fff;border:1.5px solid #8b7355;font-size:.9rem;cursor:pointer;user-select:none;transition:.15s}.word-chip.used{background:#d5cfc4;border-color:#c5bfb4;color:#aaa;pointer-events:none}.word-chip.selected{background:#2c1f0e;color:#f5f0e8;border-color:#2c1f0e}
.text-box{background:#fff;border:1px solid #d6cabb;border-radius:12px;padding:1.4rem 1.2rem;font-size:1rem;line-height:2.2;margin-bottom:1.2rem;box-shadow:0 2px 12px rgba(44,31,14,.06)}
.blank{display:inline-block;min-width:110px;padding:0 .4rem;border-bottom:2px solid #8b7355;border-radius:3px 3px 0 0;text-align:center;font-size:.92rem;cursor:pointer;transition:.15s;vertical-align:bottom}.blank.long{min-width:155px}.blank.empty{color:#bbb;font-style:italic}.blank.filled{background:#faf6f0;color:#2c1f0e}.blank.correct{background:#eaf4ea;border-color:#5a8a5a;color:#3a6b3a}.blank.wrong{background:#fdf0ef;border-color:#c0392b;color:#c0392b}.blank.active-target{border-color:#2c1f0e;background:#f0ebe0}
.buttons{display:flex;gap:.6rem;justify-content:center;margin-bottom:1rem}.btn-check{padding:.65rem 1.6rem;background:#2c1f0e;color:#f5f0e8;border:none;border-radius:6px;font-size:.9rem;font-family:Georgia,serif;cursor:pointer;letter-spacing:.05em}.btn-check:disabled{background:#c5bfb4;color:#aaa;cursor:default}.btn-reset{padding:.65rem 1.4rem;background:transparent;color:#8b7355;border:1.5px solid #8b7355;border-radius:6px;font-size:.9rem;font-family:Georgia,serif;cursor:pointer;letter-spacing:.05em}
.score{text-align:center;padding:.7rem 1rem;border-radius:8px;font-size:.95rem;margin-bottom:1rem;display:none}.score.show{display:block}.score.perfect{background:#eaf4ea;border:1.5px solid #5a8a5a;color:#3a6b3a}.score.partial{background:#fdf6ee;border:1.5px solid #c9a96e;color:#7a5c2e}.hint{text-align:center;font-size:.72rem;color:#b0a48a;letter-spacing:.04em;margin-top:.5rem}

  .btn-back{position:fixed;top:.75rem;left:.75rem;padding:.4rem .9rem;background:#2c1f0e;color:#f5f0e8;border:none;border-radius:6px;font-size:.8rem;font-family:Georgia,serif;cursor:pointer;letter-spacing:.05em;text-decoration:none;z-index:100;box-shadow:0 2px 6px rgba(44,31,14,.2)}
  .painting{display:block;max-width:280px;width:90%;margin:0 auto 1.25rem;border-radius:8px;box-shadow:0 4px 16px rgba(44,31,14,.15);border:3px solid #d6cabb}

</style>

let filled={},selectedWord=null,checked=false;
function render(){const bank=document.getElementById("bank");const used=Object.values(filled);bank.innerHTML="";WORDS.forEach(w=>{const chip=document.createElement("span");chip.className="word-chip"+(used.includes(w)?" used":"")+(selectedWord===w?" selected":"");chip.textContent=w;chip.onclick=()=>selectWord(w);bank.appendChild(chip)});const tb=document.getElementById("textbox");tb.innerHTML="";SEGMENTS.forEach(seg=>{if(seg.type==="text"){tb.appendChild(document.createTextNode(seg.content))}else{const val=filled[seg.id];const span=document.createElement("span");let cls="blank"+(seg.long?" long":"");if(checked&&val){cls+=val===seg.answer?" correct":" wrong"}else if(val){cls+=" filled"}else{cls+=" empty";if(selectedWord)cls+=" active-target"}span.className=cls;span.textContent=val?val+(checked?(val===seg.answer?" ✓":" ✗"):""):"_ _ _ _ _";span.onclick=()=>val?removeFromBlank(seg.id):fillBlank(seg.id);tb.appendChild(span)}});document.getElementById("btnCheck").disabled=Object.keys(filled).length!==SEGMENTS.filter(s=>s.type==="blank").length}
function selectWord(w){if(Object.values(filled).includes(w))return;selectedWord=selectedWord===w?null:w;checked=false;document.getElementById("score").classList.remove("show");render()}
function fillBlank(id){if(!selectedWord)return;filled[id]=selectedWord;selectedWord=null;checked=false;document.getElementById("score").classList.remove("show");render()}
function removeFromBlank(id){delete filled[id];selectedWord=null;checked=false;document.getElementById("score").classList.remove("show");render()}
function checkAnswers(){checked=true;const blanks=SEGMENTS.filter(s=>s.type==="blank");const correct=blanks.filter(b=>filled[b.id]===b.answer).length;
 saveScore(correct, blanks.length);const score=document.getElementById("score");score.classList.add("show");if(correct===blanks.length){score.className="score show perfect";score.textContent="🎉 Μπράβο! Όλες οι απαντήσεις είναι σωστές!"}else{score.className="score show partial";score.textContent=`Σωστές απαντήσεις: ${correct} / ${blanks.length}`}render()}
function reset(){filled={};selectedWord=null;checked=false;document.getElementById("score").classList.remove("show");render()}
