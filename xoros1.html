<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ματίς — Άσκηση Κενών</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#f5f0e8;font-family:Georgia,serif;padding:1.5rem 1rem 3rem;color:#2c1f0e}
.btn-back{position:fixed;top:.75rem;left:.75rem;padding:.4rem .9rem;background:#2c1f0e;color:#f5f0e8;border:none;border-radius:6px;font-size:.8rem;font-family:Georgia,serif;cursor:pointer;letter-spacing:.05em;text-decoration:none;z-index:100;box-shadow:0 2px 6px rgba(44,31,14,.2)}
.header{text-align:center;margin-bottom:1.25rem}
.header .sub{font-size:.65rem;letter-spacing:.25em;text-transform:uppercase;color:#8b7355;margin-bottom:.4rem}
.header h1{font-size:1.15rem;font-weight:normal;line-height:1.5}
.header .line{width:50px;height:2px;background:#8b7355;margin:.9rem auto 0}
.painting{display:block;max-width:280px;width:90%;margin:0 auto 1.25rem;border-radius:8px;box-shadow:0 4px 16px rgba(44,31,14,.15);border:3px solid #d6cabb}
.phase-badge{text-align:center;margin-bottom:1rem}
.phase-badge span{display:inline-block;padding:.3rem 1rem;border-radius:20px;font-size:.75rem;letter-spacing:.1em;text-transform:uppercase}
.phase-badge.p1 span{background:#ede6d6;color:#8b7355;border:1px solid #c9b89a}
.phase-badge.p2 span{background:#2c1f0e;color:#f5f0e8}
.phase-badge.p3 span{background:#5a3a8a;color:#fff}
.bank-box{background:#ede6d6;border:1px solid #c9b89a;border-radius:10px;padding:.9rem 1rem;margin-bottom:1.5rem}
.bank-label{font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:#8b7355;margin-bottom:.6rem}
.bank-words{display:flex;flex-wrap:wrap;gap:.45rem}
.word-chip{padding:.35rem .8rem;border-radius:20px;background:#fff;border:1.5px solid #8b7355;font-size:.9rem;cursor:pointer;user-select:none;transition:.15s;-webkit-tap-highlight-color:transparent}
.word-chip.used{background:#d5cfc4;border-color:#c5bfb4;color:#aaa;pointer-events:none}
.word-chip.selected{background:#2c1f0e;color:#f5f0e8;border-color:#2c1f0e}
.text-box{background:#fff;border:1px solid #d6cabb;border-radius:12px;padding:1.4rem 1.2rem;font-size:1rem;line-height:2.4;margin-bottom:1.2rem;box-shadow:0 2px 12px rgba(44,31,14,.06)}
.blank{display:inline-block;min-width:110px;padding:0 .4rem;border-bottom:2px solid #8b7355;border-radius:3px 3px 0 0;text-align:center;font-size:.92rem;cursor:pointer;transition:.15s;vertical-align:bottom;-webkit-tap-highlight-color:transparent}
.blank.long{min-width:150px}
.blank.empty{color:#bbb;font-style:italic}
.blank.filled{background:#faf6f0;color:#2c1f0e}
.blank.correct{background:#eaf4ea;border-color:#5a8a5a;color:#3a6b3a}
.blank.wrong{background:#fdf0ef;border-color:#c0392b;color:#c0392b}
.blank.active-target{border-color:#2c1f0e;background:#f0ebe0}
.blank-input{display:inline-block;min-width:110px;padding:0 .4rem;border:none;border-bottom:2px solid #8b7355;border-radius:3px 3px 0 0;background:transparent;font-family:Georgia,serif;font-size:.92rem;color:#2c1f0e;text-align:center;outline:none;transition:.15s;vertical-align:bottom}
.blank-input.long{min-width:150px}
.blank-input.correct{background:#eaf4ea;border-color:#5a8a5a;color:#3a6b3a}
.blank-input.wrong{background:#fdf0ef;border-color:#c0392b;color:#c0392b}
.blank-input:focus{border-color:#2c1f0e;background:#f0ebe0}
.p3-area{display:none}
.question-card{background:#fff;border:1px solid #d6cabb;border-radius:12px;padding:1.2rem;margin-bottom:1rem;box-shadow:0 2px 8px rgba(44,31,14,.06)}
.question-text{font-size:.95rem;line-height:1.6;margin-bottom:.8rem;color:#2c1f0e;font-weight:bold}
.question-textarea{width:100%;min-height:100px;border:1px solid #d6cabb;border-radius:8px;background:#faf6f0;font-family:Georgia,serif;font-size:.9rem;line-height:1.7;color:#2c1f0e;resize:vertical;outline:none;padding:.6rem .8rem;transition:.15s}
.question-textarea:focus{border-color:#8b7355;background:#fff}
.answer-box{display:none;margin-top:.8rem;padding:.8rem 1rem;background:#eaf4ea;border-radius:8px;border-left:3px solid #5a8a5a;font-size:.88rem;line-height:1.7;color:#2c1f0e;white-space:pre-line}
.answer-box .answer-label{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:#5a8a5a;margin-bottom:.4rem}
.answer-box.show{display:block}
.buttons{display:flex;gap:.6rem;justify-content:center;margin-bottom:1rem;flex-wrap:wrap}
.btn-check{padding:.65rem 1.6rem;background:#2c1f0e;color:#f5f0e8;border:none;border-radius:6px;font-size:.9rem;font-family:Georgia,serif;cursor:pointer;letter-spacing:.05em}
.btn-check:disabled{background:#c5bfb4;color:#aaa;cursor:default}
.btn-reset{padding:.65rem 1.4rem;background:transparent;color:#8b7355;border:1.5px solid #8b7355;border-radius:6px;font-size:.9rem;font-family:Georgia,serif;cursor:pointer;letter-spacing:.05em}
.btn-next{padding:.65rem 1.6rem;background:#5a8a5a;color:#fff;border:none;border-radius:6px;font-size:.9rem;font-family:Georgia,serif;cursor:pointer;letter-spacing:.05em;display:none}
.btn-next.p3{background:#5a3a8a}
.score{text-align:center;padding:.7rem 1rem;border-radius:8px;font-size:.95rem;margin-bottom:1rem;display:none}
.score.show{display:block}
.score.perfect{background:#eaf4ea;border:1.5px solid #5a8a5a;color:#3a6b3a}
.score.partial{background:#fdf6ee;border:1.5px solid #c9a96e;color:#7a5c2e}
.hint{text-align:center;font-size:.72rem;color:#b0a48a;letter-spacing:.04em;margin-top:.5rem}
</style>
</head>

{type:"text",content:" και επεξεργασίας."}
];
const QUESTIONS=[{"q": "4.1 α. Σε ποια ζωγραφική αντιτάχθηκαν οι Φωβ, προς ποια κατεύθυνση στράφηκαν και με ποιο στόχο; (μον.10)", "a": "Οι Φωβ αντιτάχθηκαν στην ιμπρεσιονιστική ζωγραφική του στιγμιαίου και του παροδικού και στράφηκαν προς μια ζωγραφική που αποδίδει ό,τι μένει σταθερό και αναλλοίωτο στη φύση, απελευθερώνοντας το χρώμα από την πιστή απόδοσή της (τα δέντρα μπορεί να είναι κόκκινα και η θάλασσα κίτρινη), με μια ελευθερία όμως που δεν είναι ούτε άναρχη ούτε αφελής. Αντίθετα, είναι πεποίθησή τους ότι οι ζωγράφοι προβαίνουν σε νεωτερισμούς, όταν έχουν πλήρη συνείδηση των μέσων της δουλειάς τους (σχέδιο, χρώμα) και όταν έχουν δουλέψει πολύ για να μάθουν την τεχνική τους. Ο περιορισμός της μορφής στο ουσιώδες έχει στόχο την εκφραστικότητα, όχι την πιστή αναπαράσταση."}, {"q": "4.1 β. Ποια φράση του Α. Ματίς, του σπουδαιότερου εκπρόσωπου του κινήματος των Φωβ, υπήρξε και η θέση ολόκληρης της μοντέρνας τέχνης; (μον.3)", "a": "«Η ακρίβεια δεν είναι η αλήθεια»"}, {"q": "4.2 α. Ποιος είναι ο τίτλος του παρακάτω έργου του Α. Ματίς; (μον.2)", "a": "«Ο Χορός»"}, {"q": "4.2 β. Να περιγράψετε τον πίνακα. Πού παραπέμπει το έργο αυτό ως προς τη διάθεση και ποια συναισθήματα εκφράζει ο καλλιτέχνης; (μον.10)", "a": "Το έργο δείχνει μορφές που χορεύουν σε σχήμα κύκλου. Το φόντο, έντονα χρωματισμένο και απλοποιημένο, αναδεικνύει τις μορφές, που παραπέμπουν ως προς τη διάθεση στους ταϊτινούς πίνακες του Γκωγκέν. «Η σύνθεση είναι η τέχνη του να τακτοποιείς με διακοσμητικό τρόπο τα διάφορα στοιχεία που έχει στη διάθεση του ένας ζωγράφος, για να εκφράσει τα αισθήματά του», έλεγε ο Ματίς. Ο ενθουσιώδης αυθορμητισμός στο έργο του Ματίς είναι φαινομενικά επιφανειακός. Στην πραγματικότητα το έργο του είναι προϊόν μακράς σπουδής, αναζήτησης και επεξεργασίας."}];
const EXERCISE_NAME="Ματίς — Ο Χορός";

function removeAccents(str){return str.normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase();}

let phase=1,filled={},selectedWord=null,checked=false;

function renderPhase1(){
  const bank=document.getElementById('bank');
  const used=Object.values(filled);
  bank.innerHTML='';
  WORDS.forEach(w=>{
    const chip=document.createElement('span');
    chip.className='word-chip'+(used.includes(w)?' used':'')+(selectedWord===w?' selected':'');
    chip.textContent=w;chip.onclick=()=>selectWord(w);
    bank.appendChild(chip);
  });
  const tb=document.getElementById('textbox');
  tb.innerHTML='';
  SEGMENTS.forEach(seg=>{
    if(seg.type==='text'){tb.appendChild(document.createTextNode(seg.content));}
    else{
      const val=filled[seg.id];
      const span=document.createElement('span');
      let cls='blank'+(seg.long?' long':'');
      if(checked&&val){cls+=removeAccents(val)===removeAccents(seg.answer)?' correct':' wrong';}
      else if(val){cls+=' filled';}
      else{cls+=' empty';if(selectedWord)cls+=' active-target';}
      span.className=cls;
      span.textContent=val?val+(checked?(removeAccents(val)===removeAccents(seg.answer)?' ✓':' ✗'):''):'_ _ _ _ _';
      span.onclick=()=>val?removeFromBlank(seg.id):fillBlank(seg.id);
      tb.appendChild(span);
    }
  });
  document.getElementById('btnCheck').disabled=Object.keys(filled).length!==SEGMENTS.filter(s=>s.type==='blank').length;
}

function selectWord(w){if(Object.values(filled).includes(w))return;selectedWord=selectedWord===w?null:w;checked=false;document.getElementById('score').classList.remove('show');document.getElementById('btnNext').style.display='none';renderPhase1();}
function fillBlank(id){if(!selectedWord)return;filled[id]=selectedWord;selectedWord=null;checked=false;document.getElementById('score').classList.remove('show');document.getElementById('btnNext').style.display='none';renderPhase1();}
function removeFromBlank(id){delete filled[id];selectedWord=null;checked=false;document.getElementById('score').classList.remove('show');document.getElementById('btnNext').style.display='none';renderPhase1();}

function checkAnswers(){
  if(phase===1){
    checked=true;
    const blanks=SEGMENTS.filter(s=>s.type==='blank');
    const correct=blanks.filter(b=>filled[b.id]&&removeAccents(filled[b.id])===removeAccents(b.answer)).length;
    showScore(correct,blanks.length);saveScore(correct,blanks.length);renderPhase1();
    const btn=document.getElementById('btnNext');
    btn.textContent='Φάση 2 — Χωρίς λέξεις →';
    btn.className='btn-next';btn.style.display='inline-block';
  } else if(phase===2){checkPhase2();}
  else{checkPhase3();}
}

function goNext(){if(phase===1)goPhase2();else if(phase===2)goPhase3();}

function reset(){
  filled={};selectedWord=null;checked=false;
  document.getElementById('score').classList.remove('show');
  document.getElementById('btnNext').style.display='none';
  document.getElementById('btnCheck').style.display='inline-block';
  if(phase===1)renderPhase1();
  else if(phase===2)renderPhase2();
  else{
    document.querySelectorAll('.question-textarea').forEach(t=>t.value='');
    document.querySelectorAll('.answer-box').forEach(a=>a.classList.remove('show'));
    document.getElementById('btnCheck').disabled=false;
  }
}

function goPhase2(){
  phase=2;checked=false;
  document.getElementById('phaseBadge').className='phase-badge p2';
  document.getElementById('phaseBadge').innerHTML='<span>Φάση 2 — Χωρίς λέξεις</span>';
  document.getElementById('bankBox').style.display='none';
  document.getElementById('btnNext').style.display='none';
  document.getElementById('score').classList.remove('show');
  document.getElementById('hint').textContent='Πληκτρολόγησε τις λέξεις στα κενά';
  renderPhase2();
}

function renderPhase2(){
  const tb=document.getElementById('textbox');tb.innerHTML='';
  SEGMENTS.forEach(seg=>{
    if(seg.type==='text'){tb.appendChild(document.createTextNode(seg.content));}
    else{
      const inp=document.createElement('input');
      inp.type='text';inp.className='blank-input'+(seg.long?' long':'');
      inp.dataset.answer=seg.answer;
      inp.autocomplete='off';inp.autocorrect='off';inp.autocapitalize='off';inp.spellcheck=false;
      inp.oninput=updatePhase2Button;
      inp.onkeydown=(e)=>{if(e.key==='Enter')checkPhase2();};
      tb.appendChild(inp);
    }
  });
  updatePhase2Button();
}

function updatePhase2Button(){
  const inputs=document.querySelectorAll('.blank-input');
  document.getElementById('btnCheck').disabled=!Array.from(inputs).every(i=>i.value.trim()!=='');
}

function checkPhase2(){
  const inputs=document.querySelectorAll('.blank-input');
  let correct=0;
  inputs.forEach(inp=>{
    const val=removeAccents(inp.value.trim());
    const ans=removeAccents(inp.dataset.answer);
    if(val===ans){inp.classList.add('correct');inp.classList.remove('wrong');correct++;}
    else{inp.classList.add('wrong');inp.classList.remove('correct');}
  });
  showScore(correct,inputs.length);saveScore(correct,inputs.length);
  const btn=document.getElementById('btnNext');
  btn.textContent='Φάση 3 — Ερωτήσεις →';
  btn.className='btn-next p3';btn.style.display='inline-block';
}

function goPhase3(){
  phase=3;
  document.getElementById('phaseBadge').className='phase-badge p3';
  document.getElementById('phaseBadge').innerHTML='<span>Φάση 3 — Ερωτήσεις</span>';
  document.getElementById('textbox').style.display='none';
  document.getElementById('score').classList.remove('show');
  document.getElementById('btnNext').style.display='none';
  document.getElementById('hint').textContent='Απάντησε στις ερωτήσεις και πάτα Έλεγχος για να δεις τις σωστές απαντήσεις';
  document.getElementById('btnCheck').disabled=false;
  document.getElementById('btnCheck').style.display='inline-block';

  const p3=document.getElementById('p3area');
  p3.style.display='block';
  p3.innerHTML='';
  QUESTIONS.forEach((q,i)=>{
    const card=document.createElement('div');
    card.className='question-card';
    card.innerHTML=`
      <div class="question-text">${q.q}</div>
      <textarea class="question-textarea" id="q${i}" rows="3" placeholder="Γράψε την απάντησή σου..."></textarea>
      <div class="answer-box" id="a${i}">
        <div class="answer-label">Σωστή απάντηση</div>
        <div>${q.a}</div>
      </div>`;
    p3.appendChild(card);
  });
}

function checkPhase3(){
  QUESTIONS.forEach((_,i)=>{
    document.getElementById('a'+i).classList.add('show');
  });
  document.getElementById('btnCheck').style.display='none';
  document.getElementById('hint').textContent='Σύγκρινε τις απαντήσεις σου με τις σωστές';
  saveScore(0,QUESTIONS.length);
}

function showScore(correct,total){
  const s=document.getElementById('score');s.classList.add('show');
  if(correct===total){s.className='score show perfect';s.textContent='🎉 Μπράβο! Όλες οι απαντήσεις είναι σωστές!';}
  else{s.className='score show partial';s.textContent='Σωστές απαντήσεις: '+correct+' / '+total;}
}

function saveScore(correct,total){
  var url='https://script.google.com/macros/s/AKfycbzE7K7cyg7byq4akonoiYAADxvqALfV4VL_WVe_BAK77fV0adxNDqrWgGjrCzwc0yP9xQ/exec?exercise='+encodeURIComponent(EXERCISE_NAME)+'&score='+correct+'&total='+total;
  fetch(url,{mode:'no-cors'}).catch(function(){});
}

renderPhase1();
</script>
</body>
</html>
